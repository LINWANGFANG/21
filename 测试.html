<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>机器学习测试 | 赛博历史终端 · 纯本地图表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
        }

        body {
            background: #0a0a0f;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Share Tech Mono', 'Courier New', 'Fira Code', monospace;
            padding: 2rem 1rem;
            position: relative;
            min-height: 100vh;
        }

        /* 扫光动画 */
        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(115deg, 
                transparent 30%, 
                rgba(0, 243, 255, 0.04) 45%, 
                rgba(255, 0, 229, 0.03) 55%,
                transparent 70%);
            transform: rotate(25deg);
            animation: scanline 12s infinite linear;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes scanline {
            0% { transform: rotate(25deg) translate(-30%, -30%); }
            100% { transform: rotate(25deg) translate(30%, 30%); }
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* 霓虹标题 */
        .hero-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00f3ff, #ff00e5, #b400ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.7);
            margin-bottom: 0.3rem;
        }
        .sub {
            text-align: center;
            color: #b0f0ff;
            border-bottom: 1px solid #00f3ff80;
            display: inline-block;
            width: auto;
            margin: 0 auto 1.5rem auto;
            padding-bottom: 0.6rem;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* 双栏布局 */
        .dashboard {
            display: flex;
            gap: 1.8rem;
            flex-wrap: wrap;
        }
        .exam-area {
            flex: 2;
            min-width: 280px;
        }
        .history-area {
            flex: 1.2;
            min-width: 260px;
            background: rgba(10, 10, 20, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(0, 243, 255, 0.5);
            padding: 1.2rem;
            height: fit-content;
            position: sticky;
            top: 20px;
            box-shadow: 0 0 12px rgba(0,243,255,0.2);
        }
        .history-title {
            font-size: 1.4rem;
            text-align: center;
            color: #ff00e5;
            text-shadow: 0 0 3px #ff00e5;
            border-bottom: 1px dashed #00f3ff;
            padding-bottom: 8px;
            margin-bottom: 1rem;
        }
        .record-list {
            max-height: 260px;
            overflow-y: auto;
            margin-bottom: 1.2rem;
            font-size: 0.8rem;
        }
        .record-item {
            background: rgba(0, 243, 255, 0.08);
            margin: 6px 0;
            padding: 6px 10px;
            border-left: 3px solid #00f3ff;
            color: #b9f3ff;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
        }
        .record-score {
            color: #00f3ff;
            font-weight: bold;
        }
        .empty-history {
            color: #6688aa;
            text-align: center;
            padding: 1rem;
            font-style: italic;
        }
        .chart-container {
            margin-top: 1rem;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 0.6rem;
            position: relative;
        }
        canvas {
            max-height: 200px;
            width: 100%;
            background: #0a0a14;
            border-radius: 16px;
        }
        .clear-history {
            background: transparent;
            border: 1px solid #ff00e5;
            color: #ff00e5;
            padding: 0.4rem 1rem;
            font-size: 0.7rem;
            margin-top: 1rem;
            width: 100%;
            border-radius: 30px;
            cursor: pointer;
        }
        .clear-history:hover {
            background: #ff00e5;
            color: #0a0a0a;
            box-shadow: 0 0 10px #ff00e5;
        }

        /* 卡片样式 */
        .quiz-card {
            background: rgba(10, 10, 20, 0.75);
            backdrop-filter: blur(3px);
            border-radius: 24px;
            border: 1px solid rgba(0, 243, 255, 0.5);
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.25s;
        }
        .quiz-card:hover {
            border-color: #00f3ff;
            box-shadow: 0 0 18px #00f3ff;
            transform: translateY(-3px);
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            border-left: 4px solid #ff00e5;
            padding-left: 0.8rem;
            margin-bottom: 1rem;
        }
        .q-text {
            font-weight: 700;
            color: #caf0ff;
        }
        .q-points {
            background: rgba(0, 243, 255, 0.2);
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #00f3ff;
            border: 0.5px solid #00f3ff;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            color: #d0e6ff;
            cursor: pointer;
        }
        input[type="radio"], input[type="checkbox"] {
            appearance: none;
            width: 1rem;
            height: 1rem;
            border: 1px solid #00f3ff;
            background: #0a0a1a;
            border-radius: 50%;
            cursor: pointer;
        }
        input[type="radio"]:checked {
            background: #00f3ff;
            box-shadow: 0 0 6px #00f3ff;
        }
        input[type="checkbox"] {
            border-radius: 4px;
        }
        input[type="checkbox"]:checked {
            background: #ff00e5;
            border-color: #ff00e5;
            box-shadow: 0 0 6px #ff00e5;
        }
        .truefalse-group {
            display: flex;
            gap: 1.5rem;
        }
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.2rem 0 1rem;
        }
        button {
            border: 1.5px solid #00f3ff;
            background: transparent;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
            color: #00f3ff;
            transition: 0.2s;
        }
        button:hover:not(:disabled) {
            background: #00f3ff;
            color: #0a0a0f;
            box-shadow: 0 0 20px #00f3ff;
            transform: scale(1.02);
        }
        button:disabled {
            border-color: #4a5b6e;
            color: #4a5b6e;
            cursor: not-allowed;
        }
        .reset-btn {
            border-color: #ff00e5;
            color: #ff00e5;
        }
        .reset-btn:hover:not(:disabled) {
            background: #ff00e5;
            color: #0a0a0a;
            box-shadow: 0 0 20px #ff00e5;
        }
        .result-area {
            background: rgba(10, 10, 20, 0.85);
            border-radius: 28px;
            padding: 1rem;
            margin-top: 1.5rem;
            text-align: center;
            border: 1px solid #00f3ff;
        }
        .score-big {
            font-size: 2rem;
            color: #00f3ff;
            text-shadow: 0 0 6px #00f3ff;
        }
        .pass-status {
            font-size: 1.2rem;
            background: linear-gradient(135deg, #00f3ff, #ff00e5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #50a0c0;
            margin-top: 2rem;
        }
        @media (max-width: 860px) {
            .dashboard { flex-direction: column; }
            .history-area { position: static; width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero-title">⚡ 机器学习 · 霓虹测试终端 ⚡</div>
    <div style="text-align: center;"><span class="sub">✦ 加密考卷 | 本地历史 | 原生曲线 ✦</span></div>

    <div class="dashboard">
        <!-- 左侧试卷区 -->
        <div class="exam-area">
            <div id="questionsArea"></div>
            <div class="action-bar">
                <button id="submitBtn" disabled>📡 提交核心数据</button>
                <button id="resetBtn" class="reset-btn">🌀 重启终端</button>
            </div>
            <div id="resultPanel" class="result-area" style="display: none;"></div>
        </div>

        <!-- 右侧历史记录+曲线图 (纯本地Canvas绘制，无外部库) -->
        <div class="history-area">
            <div class="history-title">📀 历史记录终端</div>
            <div id="historyList" class="record-list">
                <div class="empty-history">暂无成绩记录，提交后自动归档</div>
            </div>
            <div class="chart-container">
                <canvas id="scoreTrendCanvas" width="400" height="180" style="width:100%; max-height:180px; background:#0a0a14; border-radius:12px;"></canvas>
                <div style="font-size:0.65rem; text-align:center; margin-top:6px; color:#0af;">📈 得分趋势 (次数/分数)</div>
            </div>
            <button id="clearHistoryBtn" class="clear-history">🗑 清除历史记录</button>
            <div style="font-size:0.65rem; text-align:center; margin-top:12px; color:#0af;">🔒 本地存储 | 最高分可视化</div>
        </div>
    </div>
    <footer>© 机器学习协议 | 答案全程加密 | 历史曲线基于原生Canvas</footer>
</div>

<script>
    // ======================= 加密模块 (字符偏移+base64) =======================
    function encode(str) {
        let shifted = "";
        for (let i = 0; i < str.length; i++) shifted += String.fromCharCode(str.charCodeAt(i) + 5);
        return btoa(shifted);
    }
    function decode(enc) {
        let shifted = atob(enc);
        let original = "";
        for (let i = 0; i < shifted.length; i++) original += String.fromCharCode(shifted.charCodeAt(i) - 5);
        return original;
    }

    // 加密答案库 (百分制: 单选10*4=40, 多选5*6=30, 判断5*6=30, 总分100)
    const encryptedMap = {
        "q0": encode("C"), "q1": encode("B"), "q2": encode("A"), "q3": encode("C"), "q4": encode("B"),
        "q5": encode("A"), "q6": encode("C"), "q7": encode("B"), "q8": encode("A"), "q9": encode("C"),
        "q10": encode("ABD"), "q11": encode("BCD"), "q12": encode("ABC"), "q13": encode("ACD"), "q14": encode("BD"),
        "q15": encode("true"), "q16": encode("false"), "q17": encode("true"), "q18": encode("false"), "q19": encode("true")
    };
    function getCorrect(qid) { return decode(encryptedMap[qid]); }

    // 题库（完全来自素材内容）
    const questionsData = [
        { id: "q0", type: "radio", points: 4, text: "🔹 根据'轮子故事'，机器学习的核心思想是？", options: ["A. 记忆所有规则", "B. 编写逻辑手册", "C. 看例子、自己悟，让数据说话", "D. 专家系统"] },
        { id: "q1", type: "radio", points: 4, text: "🔹 传统编程 vs 机器学习，机器学习的特点是？", options: ["A. 给规则和数据得结果", "B. 给数据和结果得规则", "C. 无需数据", "D. 纯逻辑编码"] },
        { id: "q2", type: "radio", points: 4, text: "🔹 '上课模式，有标准答案' 指的是哪种学习？", options: ["A. 监督学习", "B. 无监督学习", "C. 强化学习", "D. 深度学习"] },
        { id: "q3", type: "radio", points: 4, text: "🔹 无监督学习的核心特点是？", options: ["A. 奖惩信号", "B. 依赖标签答案", "C. 没答案，自动发现分组结构", "D. 模仿神经元"] },
        { id: "q4", type: "radio", points: 4, text: "🔹 强化学习被比喻为？", options: ["A. 刷题模式", "B. 训狗模式(奖惩试错)", "C. 自学模式", "D. 模板匹配"] },
        { id: "q5", type: "radio", points: 4, text: "🔹 反向传播算法主要贡献是？", options: ["A. 解决多层神经网络训练", "B. 解决异或问题", "C. 发明GPU", "D. 数据增强"] },
        { id: "q6", type: "radio", points: 4, text: "🔹 GPU推动AI革命的原因？", options: ["A. 价格低廉", "B. 逻辑运算极强", "C. 大量并行简单计算适配神经网络", "D. 内置AI引擎"] },
        { id: "q7", type: "radio", points: 4, text: "🔹 机器学习本质一句话概括？", options: ["A. 编写复杂程序", "B. 在数据中寻找模式", "C. 构建知识图谱", "D. 模拟情感"] },
        { id: "q8", type: "radio", points: 4, text: "🔹 机器学习得出的规律往往？", options: ["A. 说不清具体因果原理", "B. 完美解释原因", "C. 永远正确", "D. 绝对避免错误"] },
        { id: "q9", type: "radio", points: 4, text: "🔹 机器学习最大陷阱/弱点是？", options: ["A. 速度太慢", "B. 依赖海量电力", "C. 只能发现相关性，分不清因果", "D. 无法识别图片"] },
        { id: "q10", type: "checkbox", points: 6, text: "⚡ 以下属于监督学习典型应用的有？", options: ["A. 手机人脸识别", "B. 垃圾邮件过滤", "C. 按颜色分组乐高(无监督)", "D. 照片自动分类"] },
        { id: "q11", type: "checkbox", points: 6, text: "⚡ 深度学习等了四十年的三大关键要素？", options: ["A. 新数学理论", "B. 算法(反向传播)", "C. 海量数据", "D. 强大算力(GPU)"] },
        { id: "q12", type: "checkbox", points: 6, text: "⚡ 关于生成式AI的突破，正确的是？", options: ["A. Sora生成60秒视频", "B. 谷歌巴德创作故事诗歌", "C. DALL·E生成艺术图像", "D. 传统规则引擎"] },
        { id: "q13", type: "checkbox", points: 6, text: "⚡ 脑机接口相关正确叙述？", options: ["A. 清华无线微创实现自主喝水", "B. 脑机接口无法医疗康复", "C. 马斯克Neuralink侵入式", "D. 帮助瘫痪患者恢复功能"] },
        { id: "q14", type: "checkbox", points: 6, text: "⚡ '相关不等于因果' 的观点正确的有？", options: ["A. 冰淇淋销量高必然导致溺水", "B. 气温导致两者虚假相关", "C. 机器学习自动识别因果", "D. 相关关系不代表因果"] },
        { id: "q15", type: "truefalse", points: 6, text: "🔮 传统编程是‘规则→结果’，机器学习是‘数据+结果→规则’。", options: ["正确", "错误"] },
        { id: "q16", type: "truefalse", points: 6, text: "🔮 GPU最初专为AI训练设计。", options: ["正确", "错误"] },
        { id: "q17", type: "truefalse", points: 6, text: "🔮 华为云盘古气象大模型曾上线欧洲中期天气预报官网。", options: ["正确", "错误"] },
        { id: "q18", type: "truefalse", points: 6, text: "🔮 机器学习总能清楚解释因果关系。", options: ["正确", "错误"] },
        { id: "q19", type: "truefalse", points: 6, text: "🔮 OpenAI Sora可根据文本生成最长60秒视频。", options: ["正确", "错误"] }
    ];

    // ========= 历史记录管理 (localStorage) + 原生Canvas绘制曲线 =========
    let historyRecords = [];   // 每个元素 { score, timestamp, dateStr }

    function loadHistory() {
        const stored = localStorage.getItem("cyber_ml_history");
        if (stored) {
            try {
                historyRecords = JSON.parse(stored);
            } catch(e) { historyRecords = []; }
        } else {
            historyRecords = [];
        }
        // 按时间升序（旧到新），便于曲线横坐标顺序
        historyRecords.sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
        renderHistoryList();
        drawTrendChart();      // 原生Canvas绘图
    }

    function saveHistory() {
        localStorage.setItem("cyber_ml_history", JSON.stringify(historyRecords));
    }

    function addHistoryRecord(score) {
        const now = new Date();
        const dateStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        const record = {
            score: score,
            timestamp: now.toISOString(),
            dateStr: dateStr
        };
        historyRecords.push(record);
        historyRecords.sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
        saveHistory();
        renderHistoryList();
        drawTrendChart();
    }

    function renderHistoryList() {
        const container = document.getElementById("historyList");
        if (!historyRecords.length) {
            container.innerHTML = '<div class="empty-history">🔮 暂无成绩记录，首次提交后生成历史曲线</div>';
            return;
        }
        let html = '';
        // 倒序显示最新在上方
        [...historyRecords].reverse().forEach(rec => {
            html += `<div class="record-item">
                        <span>📅 ${rec.dateStr}</span>
                        <span class="record-score">⚡ ${rec.score} 分</span>
                     </div>`;
        });
        container.innerHTML = html;
    }

    // 原生Canvas绘制折线图 (无任何外部依赖)
    function drawTrendChart() {
        const canvas = document.getElementById("scoreTrendCanvas");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = w;
        canvas.height = h;
        
        ctx.clearRect(0, 0, w, h);
        // 背景色
        ctx.fillStyle = "#0a0a14";
        ctx.fillRect(0, 0, w, h);
        if (!historyRecords.length) {
            ctx.fillStyle = "#6688aa";
            ctx.font = "12px monospace";
            ctx.textAlign = "center";
            ctx.fillText("暂无数据，提交后显示曲线", w/2, h/2);
            return;
        }
        
        const scores = historyRecords.map(r => r.score);
        const count = scores.length;
        if (count === 0) return;
        
        const margin = { top: 20, right: 20, bottom: 25, left: 35 };
        const graphW = w - margin.left - margin.right;
        const graphH = h - margin.top - margin.bottom;
        if (graphW <= 0 || graphH <= 0) return;
        
        // 计算Y轴范围 0~100
        const maxScore = 100;
        const minScore = 0;
        
        const getX = (index) => margin.left + (index / (count - 1 || 1)) * graphW;
        const getY = (score) => margin.top + graphH - ( (score - minScore) / (maxScore - minScore) ) * graphH;
        
        // 绘制网格线 (霓虹风格)
        ctx.save();
        ctx.strokeStyle = "#00f3ff20";
        ctx.lineWidth = 0.5;
        // 水平网格 0,25,50,75,100
        for (let v = 0; v <= 100; v += 25) {
            const y = getY(v);
            ctx.beginPath();
            ctx.moveTo(margin.left, y);
            ctx.lineTo(margin.left + graphW, y);
            ctx.stroke();
            ctx.fillStyle = "#6a8fbb";
            ctx.font = "10px monospace";
            ctx.fillText(v.toString(), margin.left - 20, y + 3);
        }
        // 垂直网格按索引
        for (let i = 0; i < count; i++) {
            const x = getX(i);
            ctx.beginPath();
            ctx.moveTo(x, margin.top);
            ctx.lineTo(x, margin.top + graphH);
            ctx.stroke();
        }
        
        // 绘制折线及数据点
        ctx.beginPath();
        let first = true;
        for (let i = 0; i < count; i++) {
            const x = getX(i);
            const y = getY(scores[i]);
            if (first) {
                ctx.moveTo(x, y);
                first = false;
            } else {
                ctx.lineTo(x, y);
            }
        }
        ctx.strokeStyle = "#00f3ff";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // 填充下方渐变
        ctx.lineTo(getX(count-1), getY(0));
        ctx.lineTo(getX(0), getY(0));
        ctx.closePath();
        const gradient = ctx.createLinearGradient(0, margin.top, 0, margin.top+graphH);
        gradient.addColorStop(0, "rgba(0,243,255,0.2)");
        gradient.addColorStop(1, "rgba(0,243,255,0.02)");
        ctx.fillStyle = gradient;
        ctx.fill();
        
        // 绘制数据点 (霓虹粉)
        for (let i = 0; i < count; i++) {
            const x = getX(i);
            const y = getY(scores[i]);
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, 2*Math.PI);
            ctx.fillStyle = "#ff00e5";
            ctx.shadowBlur = 6;
            ctx.shadowColor = "#ff00e5";
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(x, y, 1.5, 0, 2*Math.PI);
            ctx.fill();
        }
        
        // X轴标注: 次数序号
        ctx.fillStyle = "#8ab3ff";
        ctx.font = "9px monospace";
        ctx.textAlign = "center";
        for (let i = 0; i < count; i++) {
            const x = getX(i);
            ctx.fillText(`${i+1}`, x, margin.top + graphH + 12);
        }
        ctx.fillStyle = "#00f3ff";
        ctx.font = "bold 10px monospace";
        ctx.fillText("提交次数 →", w/2, h-6);
        ctx.save();
        ctx.translate(15, h/2);
        ctx.rotate(-Math.PI/2);
        ctx.fillStyle = "#00f3ff";
        ctx.fillText("得分", -8, 0);
        ctx.restore();
        
        // 绘制最高分标记
        const maxVal = Math.max(...scores);
        const maxIdx = scores.indexOf(maxVal);
        const maxX = getX(maxIdx);
        const maxY = getY(maxVal);
        ctx.beginPath();
        ctx.moveTo(maxX-5, maxY-5);
        ctx.lineTo(maxX, maxY-12);
        ctx.lineTo(maxX+5, maxY-5);
        ctx.fillStyle = "#ffaa33";
        ctx.fill();
        ctx.fillStyle = "#ffcc88";
        ctx.font = "bold 9px monospace";
        ctx.fillText(`🏆${maxVal}`, maxX+3, maxY-8);
    }

    function clearHistory() {
        if (confirm("⚠️ 清除所有历史成绩记录，曲线将重置，是否继续？")) {
            historyRecords = [];
            saveHistory();
            renderHistoryList();
            drawTrendChart();
        }
    }

    // ---------- 考试渲染及交互 ----------
    function renderQuestions() {
        const container = document.getElementById("questionsArea");
        container.innerHTML = "";
        questionsData.forEach((q, idx) => {
            const card = document.createElement("div");
            card.className = "quiz-card";
            const header = document.createElement("div");
            header.className = "question-header";
            header.innerHTML = `<span class="q-text">${idx+1}. ${q.text}</span><span class="q-points">⚡${q.points}分</span>`;
            card.appendChild(header);
            const optsDiv = document.createElement("div");
            optsDiv.className = "options";
            const groupName = `q_${q.id}`;
            if (q.type === "radio") {
                q.options.forEach(opt => {
                    const label = document.createElement("label");
                    label.className = "option-item";
                    const radio = document.createElement("input");
                    radio.type = "radio";
                    radio.name = groupName;
                    radio.value = opt.charAt(0);
                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(" " + opt));
                    optsDiv.appendChild(label);
                });
            } else if (q.type === "checkbox") {
                q.options.forEach(opt => {
                    const label = document.createElement("label");
                    label.className = "option-item";
                    const cb = document.createElement("input");
                    cb.type = "checkbox";
                    cb.name = groupName;
                    cb.value = opt.charAt(0);
                    label.appendChild(cb);
                    label.appendChild(document.createTextNode(" " + opt));
                    optsDiv.appendChild(label);
                });
            } else if (q.type === "truefalse") {
                const groupDiv = document.createElement("div");
                groupDiv.className = "truefalse-group";
                ["正确","错误"].forEach((txt, i) => {
                    const label = document.createElement("label");
                    label.className = "option-item";
                    const radio = document.createElement("input");
                    radio.type = "radio";
                    radio.name = groupName;
                    radio.value = (i === 0) ? "true" : "false";
                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(" " + txt));
                    groupDiv.appendChild(label);
                });
                optsDiv.appendChild(groupDiv);
            }
            card.appendChild(optsDiv);
            container.appendChild(card);
        });
    }

    function isAllAnswered() {
        for (let q of questionsData) {
            const group = `q_${q.id}`;
            if (q.type === "radio" || q.type === "truefalse") {
                let checked = false;
                document.querySelectorAll(`input[name="${group}"]`).forEach(inp => { if (inp.checked) checked = true; });
                if (!checked) return false;
            } else if (q.type === "checkbox") {
                let any = false;
                document.querySelectorAll(`input[name="${group}"]`).forEach(cb => { if (cb.checked) any = true; });
                if (!any) return false;
            }
        }
        return true;
    }

    function updateSubmitBtn() {
        const btn = document.getElementById("submitBtn");
        btn.disabled = !isAllAnswered();
    }

    function computeScore() {
        let total = 0;
        for (let q of questionsData) {
            const groupName = `q_${q.id}`;
            let userVal = "";
            if (q.type === "radio" || q.type === "truefalse") {
                let selected = null;
                document.querySelectorAll(`input[name="${groupName}"]`).forEach(inp => { if (inp.checked) selected = inp.value; });
                userVal = selected || "";
            } else if (q.type === "checkbox") {
                let checkedVals = [];
                document.querySelectorAll(`input[name="${groupName}"]:checked`).forEach(cb => { checkedVals.push(cb.value); });
                userVal = checkedVals.sort().join("");
            }
            const correct = getCorrect(q.id);
            let ok = false;
            if (q.type === "checkbox") ok = (userVal === correct);
            else ok = (userVal.toLowerCase() === correct.toLowerCase());
            if (ok) total += q.points;
        }
        return total;
    }

    let submittedFlag = false;
    function onSubmit() {
        if (submittedFlag) {
            alert("⚠️ 本次会话已提交过，如需重测请点击「重启终端」后再提交，将会新增历史记录。");
            return;
        }
        if (!isAllAnswered()) {
            alert("❌ 试题未全部作答，无法提交。");
            return;
        }
        const score = computeScore();
        addHistoryRecord(score);   // 存入本地历史，刷新曲线
        
        let passMsg = "", motivationMsg = "";
        if (score >= 80) {
            passMsg = "✅ 过关 · 神经链接评级 S ✅";
            motivationMsg = "⚡ 赛博赞誉：机器学习核心协议已掌握！历史曲线见证你的突破。";
        } else if (score >= 60) {
            passMsg = "📡 未过关 · 数据链路不稳 (60~79分) 📡";
            motivationMsg = "💾 中等警告：仍需巩固核心协议。复盘后再次挑战，刷新曲线！";
        } else {
            passMsg = "⚠️ 未过关 · 核心矩阵需要重新训练 ⚠️";
            motivationMsg = "🌀 温和提示：从监督/无监督/强化学习重新载入，再试一次刷新纪录。";
        }
        const panel = document.getElementById("resultPanel");
        panel.style.display = "block";
        panel.innerHTML = `
            <div class="score-big">🔮 本次得分：${score} / 100</div>
            <div class="pass-status">${passMsg}</div>
            <div class="motivation" style="font-size:0.8rem;">${motivationMsg}</div>
            <div style="margin-top:8px; font-size:0.7rem;">✅ 成绩已存入历史终端</div>
        `;
        submittedFlag = true;
        document.getElementById("submitBtn").disabled = true;
    }

    function resetExam() {
        document.querySelectorAll("input").forEach(inp => {
            if (inp.type === "radio" || inp.type === "checkbox") inp.checked = false;
        });
        submittedFlag = false;
        document.getElementById("resultPanel").style.display = "none";
        updateSubmitBtn();
    }

    function bindEvents() {
        document.addEventListener("change", (e) => {
            if (e.target && (e.target.type === "radio" || e.target.type === "checkbox")) updateSubmitBtn();
        });
        document.getElementById("submitBtn").addEventListener("click", onSubmit);
        document.getElementById("resetBtn").addEventListener("click", resetExam);
        document.getElementById("clearHistoryBtn").addEventListener("click", clearHistory);
    }

    // 启动
    renderQuestions();
    loadHistory();
    bindEvents();
    updateSubmitBtn();
    window.addEventListener('resize', () => drawTrendChart());
</script>
</body>
</html>
