<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>机器学习测试 | 历史成绩档案 · 赛博终端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Share Tech Mono', 'Courier New', 'Fira Code', monospace;
            padding: 1.5rem 1rem;
            position: relative;
            min-height: 100vh;
        }

        /* 扫光动画 */
        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(115deg, 
                transparent 30%, 
                rgba(0, 243, 255, 0.04) 45%, 
                rgba(255, 0, 229, 0.03) 55%,
                transparent 70%);
            transform: rotate(25deg);
            animation: scanline 12s infinite linear;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes scanline {
            0% { transform: rotate(25deg) translate(-30%, -30%); }
            100% { transform: rotate(25deg) translate(30%, 30%); }
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* 霓虹标题 */
        .hero-title {
            text-align: center;
            font-size: 2.3rem;
            font-weight: 800;
            letter-spacing: 2px;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00f3ff, #ff00e5, #b400ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.7);
            margin-bottom: 0.3rem;
        }

        .sub {
            text-align: center;
            color: #b0f0ff;
            border-bottom: 1px solid #00f3ff80;
            display: inline-block;
            width: auto;
            margin: 0 auto 1.8rem auto;
            padding-bottom: 0.6rem;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* 统计卡片区 */
        .stats-grid {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .stat-card {
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            border: 1px solid rgba(0, 243, 255, 0.5);
            padding: 1rem 1.8rem;
            text-align: center;
            flex: 1;
            min-width: 140px;
            transition: all 0.2s;
        }

        .stat-card:hover {
            border-color: #00f3ff;
            box-shadow: 0 0 15px #00f3ff;
            transform: translateY(-3px);
        }

        .stat-label {
            font-size: 0.75rem;
            color: #8ab3ff;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00f3ff;
            text-shadow: 0 0 4px #00f3ff;
        }

        /* 双栏布局：左侧图表，右侧列表 */
        .history-dashboard {
            display: flex;
            gap: 1.8rem;
            flex-wrap: wrap;
        }

        .chart-panel {
            flex: 1.4;
            min-width: 280px;
            background: rgba(10, 10, 20, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(0, 243, 255, 0.5);
            padding: 1.2rem;
        }

        .list-panel {
            flex: 1;
            min-width: 260px;
            background: rgba(10, 10, 20, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(0, 243, 255, 0.5);
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 1.3rem;
            text-align: center;
            color: #ff00e5;
            text-shadow: 0 0 3px #ff00e5;
            border-bottom: 1px dashed #00f3ff;
            padding-bottom: 8px;
            margin-bottom: 1rem;
        }

        .chart-container {
            position: relative;
            margin-bottom: 0.8rem;
        }

        canvas {
            width: 100%;
            background: #0a0a14;
            border-radius: 20px;
            padding: 0.2rem;
        }

        .record-list {
            flex: 1;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }

        .record-item {
            background: rgba(0, 243, 255, 0.08);
            margin: 8px 0;
            padding: 8px 12px;
            border-left: 3px solid #00f3ff;
            color: #caf0ff;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.1s;
        }

        .record-item:hover {
            background: rgba(0, 243, 255, 0.2);
            border-left-color: #ff00e5;
        }

        .record-date {
            font-size: 0.75rem;
        }

        .record-score {
            font-weight: bold;
            color: #00f3ff;
            font-size: 1.1rem;
        }

        .badge-pass {
            color: #36c96b;
            text-shadow: 0 0 2px #36c96b;
        }

        .badge-fail {
            color: #ff6680;
        }

        .empty-history {
            color: #6688aa;
            text-align: center;
            padding: 2rem;
            font-style: italic;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        button {
            border: 1.5px solid #00f3ff;
            background: transparent;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
            color: #00f3ff;
            transition: 0.2s;
        }

        button:hover {
            background: #00f3ff;
            color: #0a0a0f;
            box-shadow: 0 0 15px #00f3ff;
            transform: scale(1.02);
        }

        .btn-danger {
            border-color: #ff00e5;
            color: #ff00e5;
        }

        .btn-danger:hover {
            background: #ff00e5;
            color: #0a0a0a;
            box-shadow: 0 0 15px #ff00e5;
        }

        .btn-back {
            border-color: #b400ff;
            color: #b400ff;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #50a0c0;
            margin-top: 2.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero-title">📀 历史成绩档案 · 机器学习终端</div>
    <div style="text-align: center;"><span class="sub">✦ 成绩趋势 | 历史回溯 | 加密存储 ✦</span></div>

    <!-- 统计卡片 -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-label">总测验次数</div><div class="stat-value" id="totalCount">0</div></div>
        <div class="stat-card"><div class="stat-label">平均分</div><div class="stat-value" id="avgScore">0</div></div>
        <div class="stat-card"><div class="stat-label">最高分</div><div class="stat-value" id="maxScore">0</div></div>
        <div class="stat-card"><div class="stat-label">最低分</div><div class="stat-value" id="minScore">0</div></div>
        <div class="stat-card"><div class="stat-label">过关次数(≥80)</div><div class="stat-value" id="passCount">0</div></div>
    </div>

    <div class="history-dashboard">
        <!-- 左侧曲线图区域 -->
        <div class="chart-panel">
            <div class="panel-title">📈 得分趋势曲线</div>
            <div class="chart-container">
                <canvas id="trendCanvas" width="500" height="240" style="width:100%; height:auto; max-height:240px; background:#0a0a14; border-radius:16px;"></canvas>
            </div>
            <div style="font-size:0.7rem; text-align:center; color:#0af;">📊 横轴: 测验次序 (第N次) &nbsp;&nbsp; 纵轴: 得分(0-100)</div>
        </div>

        <!-- 右侧历史列表 -->
        <div class="list-panel">
            <div class="panel-title">📋 历史记录明细</div>
            <div id="historyRecordList" class="record-list">
                <div class="empty-history">⏳ 加载中...</div>
            </div>
            <div class="action-buttons">
                <button id="refreshBtn">🔄 刷新数据</button>
                <button id="clearAllHistoryBtn" class="btn-danger">🗑 清空全部历史</button>
                <button id="backToTestBtn" class="btn-back">📚 返回测验主页</button>
            </div>
            <div style="font-size:0.6rem; text-align:center; margin-top:12px; color:#4a8fbb;">数据存储于本地 | 与测验页面共享</div>
        </div>
    </div>
    <footer>⚡ 成绩档案独立终端 | 所有记录加密存储于浏览器本地</footer>
</div>

<script>
    // ======================= 历史记录管理 (与主测验页面完全兼容，统一localStorage key) =======================
    const STORAGE_KEY = "cyber_ml_history";
    
    // 加载历史记录
    function loadHistoryRecords() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                let records = JSON.parse(stored);
                // 确保按时间升序（旧到新）
                records.sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
                return records;
            } catch(e) {
                return [];
            }
        }
        return [];
    }

    // 保存历史记录
    function saveHistoryRecords(records) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    // 更新统计卡片
    function updateStats(records) {
        const count = records.length;
        document.getElementById("totalCount").innerText = count;
        if (count === 0) {
            document.getElementById("avgScore").innerText = "—";
            document.getElementById("maxScore").innerText = "—";
            document.getElementById("minScore").innerText = "—";
            document.getElementById("passCount").innerText = "0";
            return;
        }
        const scores = records.map(r => r.score);
        const sum = scores.reduce((a,b) => a + b, 0);
        const avg = (sum / count).toFixed(1);
        const maxVal = Math.max(...scores);
        const minVal = Math.min(...scores);
        const passNum = scores.filter(s => s >= 80).length;
        document.getElementById("avgScore").innerText = avg;
        document.getElementById("maxScore").innerText = maxVal;
        document.getElementById("minScore").innerText = minVal;
        document.getElementById("passCount").innerText = passNum;
    }

    // 渲染历史记录列表 (倒序显示最新在上)
    function renderHistoryList(records) {
        const container = document.getElementById("historyRecordList");
        if (!records.length) {
            container.innerHTML = '<div class="empty-history">✨ 暂无成绩记录，请先完成测验提交 ✨</div>';
            return;
        }
        let html = '';
        // 倒序展示（最新在上）
        [...records].reverse().forEach((rec, idx) => {
            const score = rec.score;
            const passClass = score >= 80 ? 'badge-pass' : 'badge-fail';
            const statusIcon = score >= 80 ? '✔️' : '⚠️';
            // 格式化日期显示更加友好
            let displayDate = rec.dateStr;
            if (!displayDate && rec.timestamp) {
                const d = new Date(rec.timestamp);
                displayDate = `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
            } else if (!displayDate) {
                displayDate = "未知时间";
            }
            html += `
                <div class="record-item">
                    <div class="record-date">📅 ${displayDate}</div>
                    <div class="record-score ${passClass}">${statusIcon} ${score} 分</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // 原生Canvas绘制折线图（无任何外部依赖）
    function drawTrendChart(records) {
        const canvas = document.getElementById("trendCanvas");
        if (!canvas) return;
        const container = canvas.parentElement;
        const width = container.clientWidth - 20;
        // 设置合理高度
        const height = 220;
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, width, height);
        
        // 背景填充
        ctx.fillStyle = "#0a0a14";
        ctx.fillRect(0, 0, width, height);
        
        if (!records.length) {
            ctx.fillStyle = "#6688aa";
            ctx.font = "12px monospace";
            ctx.textAlign = "center";
            ctx.fillText("暂无数据，完成测验后显示趋势", width/2, height/2);
            return;
        }
        
        const scores = records.map(r => r.score);
        const count = scores.length;
        if (count === 1) {
            // 单个点特殊绘制
            const margin = { top: 20, right: 20, bottom: 25, left: 35 };
            const graphW = width - margin.left - margin.right;
            const graphH = height - margin.top - margin.bottom;
            if (graphW > 0 && graphH > 0) {
                const x = margin.left + graphW/2;
                const y = margin.top + graphH - (scores[0] / 100) * graphH;
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, 2*Math.PI);
                ctx.fillStyle = "#ff00e5";
                ctx.shadowBlur = 6;
                ctx.shadowColor = "#ff00e5";
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.arc(x, y, 2.5, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = "#00f3ff";
                ctx.font = "9px monospace";
                ctx.fillText(`得分 ${scores[0]}`, x-20, y-6);
            }
            drawGridAndAxes(ctx, width, height, records);
            return;
        }
        
        // 多数据点：绘制折线
        const margin = { top: 20, right: 20, bottom: 25, left: 35 };
        const graphW = width - margin.left - margin.right;
        const graphH = height - margin.top - margin.bottom;
        if (graphW <= 0 || graphH <= 0) return;
        
        const getX = (index) => margin.left + (index / (count - 1)) * graphW;
        const getY = (score) => margin.top + graphH - (score / 100) * graphH;
        
        // 绘制网格（水平线及0,25,50,75,100参考线）
        ctx.save();
        ctx.strokeStyle = "#00f3ff20";
        ctx.lineWidth = 0.6;
        for (let v = 0; v <= 100; v += 25) {
            const y = getY(v);
            ctx.beginPath();
            ctx.moveTo(margin.left, y);
            ctx.lineTo(margin.left + graphW, y);
            ctx.stroke();
            ctx.fillStyle = "#8ab3ff";
            ctx.font = "9px monospace";
            ctx.fillText(v.toString(), margin.left - 20, y + 3);
        }
        // 垂直辅助线（按索引）
        for (let i = 0; i < count; i++) {
            const x = getX(i);
            ctx.beginPath();
            ctx.moveTo(x, margin.top);
            ctx.lineTo(x, margin.top + graphH);
            ctx.stroke();
        }
        
        // 绘制折线及填充
        ctx.beginPath();
        for (let i = 0; i < count; i++) {
            const x = getX(i);
            const y = getY(scores[i]);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = "#00f3ff";
        ctx.lineWidth = 2.2;
        ctx.stroke();
        
        // 填充渐变
        ctx.lineTo(getX(count-1), getY(0));
        ctx.lineTo(getX(0), getY(0));
        ctx.closePath();
        const gradient = ctx.createLinearGradient(0, margin.top, 0, margin.top+graphH);
        gradient.addColorStop(0, "rgba(0,243,255,0.25)");
        gradient.addColorStop(1, "rgba(0,243,255,0.02)");
        ctx.fillStyle = gradient;
        ctx.fill();
        
        // 绘制数据点
        for (let i = 0; i < count; i++) {
            const x = getX(i);
            const y = getY(scores[i]);
            ctx.beginPath();
            ctx.arc(x, y, 4.5, 0, 2*Math.PI);
            ctx.fillStyle = "#ff00e5";
            ctx.shadowBlur = 5;
            ctx.shadowColor = "#ff00e5";
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(x, y, 2, 0, 2*Math.PI);
            ctx.fill();
        }
        
        // 标注最高分点
        const maxScoreVal = Math.max(...scores);
        const maxIdx = scores.indexOf(maxScoreVal);
        const maxX = getX(maxIdx);
        const maxY = getY(maxScoreVal);
        ctx.fillStyle = "#ffcc44";
        ctx.font = "bold 9px monospace";
        ctx.shadowBlur = 0;
        ctx.fillText(`🏆 ${maxScoreVal}`, maxX+5, maxY-6);
        
        // X轴文字: 第几次
        ctx.fillStyle = "#8ab3ff";
        ctx.font = "9px monospace";
        ctx.textAlign = "center";
        for (let i = 0; i < count; i++) {
            const x = getX(i);
            ctx.fillText(`${i+1}`, x, margin.top + graphH + 12);
        }
        ctx.fillStyle = "#00f3ff";
        ctx.font = "bold 9px monospace";
        ctx.fillText("测验次数 →", width/2, height-6);
        ctx.save();
        ctx.translate(18, height/2);
        ctx.rotate(-Math.PI/2);
        ctx.fillStyle = "#00f3ff";
        ctx.fillText("得分", -6, 0);
        ctx.restore();
        
        drawGridAndAxes(ctx, width, height, records); // 实际上网格已画过，此函数仅为了统一标注轴线
    }
    
    function drawGridAndAxes(ctx, width, height, records) {
        // 兼容函数，不做额外操作，避免重复；已经画过网格，此函数占位保持一致性
        const margin = { top: 20, right: 20, bottom: 25, left: 35 };
        ctx.beginPath();
        ctx.strokeStyle = "#00f3ff60";
        ctx.lineWidth = 1;
        ctx.moveTo(margin.left, margin.top);
        ctx.lineTo(margin.left, height - margin.bottom);
        ctx.lineTo(width - margin.right, height - margin.bottom);
        ctx.stroke();
    }

    // 清空所有历史
    function clearAllHistory() {
        if (confirm("⚠️ 危险操作：这将永久删除所有历史成绩记录，且不可恢复。是否继续？")) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
            refreshAllData();
        }
    }

    // 刷新页面数据（重新加载、更新UI、重绘曲线）
    function refreshAllData() {
        const records = loadHistoryRecords();
        updateStats(records);
        renderHistoryList(records);
        drawTrendChart(records);
    }

    // 返回测验主页（因为独立页面，可跳转回主页面，主页面假定为 index.html 或当前页同目录）
    function backToTest() {
        // 尝试跳转到测验主页面（通常为提供完整测验的页面，用户可自定义，这里默认跳转到上一页或根目录）
        // 如果无法确定，提供一个友好提示，也可以使用 history.back，但更稳的做法是提示用户。
        if (document.referrer && document.referrer.includes(window.location.host)) {
            window.history.back();
        } else {
            // 尝试重定向到主测验页面（假设测验页与当前history页面同级且命名为 index.html 或机器学习测验.html）
            window.location.href = "./机器学习基础知识过关测试.html";
            // 如果上述跳转失败或不确定，展示引导
            setTimeout(() => {
                alert("未找到测验主页面，请手动回到测验页面。若当前是独立窗口，可关闭此页。");
            }, 100);
        }
    }

    // 监听页面加载 以及 窗口大小变化重新绘制曲线
    window.addEventListener("load", () => {
        refreshAllData();
        // 绑定按钮事件
        document.getElementById("refreshBtn").addEventListener("click", refreshAllData);
        document.getElementById("clearAllHistoryBtn").addEventListener("click", clearAllHistory);
        document.getElementById("backToTestBtn").addEventListener("click", backToTest);
    });
    
    window.addEventListener("resize", () => {
        const records = loadHistoryRecords();
        drawTrendChart(records);
    });
    
    // 额外监听存储事件，当其他页面（测验页）更新历史时自动刷新
    window.addEventListener("storage", (e) => {
        if (e.key === STORAGE_KEY) {
            refreshAllData();
        }
    });
</script>
</body>
</html>
